<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/C3 logo.png?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="C3 Catálogo" />
    <link rel="apple-touch-icon" href="/C3 logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>C3 Nicaragua - Catálogo de Vasos Térmicos | Tu idea, tu estilo</title>
    <meta name="description" content="Catálogo digital de vasos térmicos de las mejores marcas: Stanley, YETI, Owala, Lululemon, Thermos y Disney. Precios exclusivos para distribuidores." />
    <!-- Open Graph for Rich Previews (WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="C3 Nicaragua - Catálogo de Vasos Térmicos" />
    <meta property="og:description" content="Vasos térmicos de las mejores marcas (Stanley, YETI, Owala, Lululemon, Thermos, Disney). Precios al detalle y por mayor para distribuidores." />
    <meta property="og:image" content="https://c3-nicaragua.vercel.app/C3 logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://c3-nicaragua.vercel.app" />
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('c3_theme');
          var isDark = saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.querySelector("link[rel='icon']").href = "/Logo Blanco C3.png?v=2";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
